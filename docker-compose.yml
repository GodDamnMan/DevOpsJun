services:
  backend:
    build:
      context: ./backend
    container_name: backend_service
    expose:
      - "8080"
    networks:
      - intranet
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_service
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - intranet
    restart: unless-stopped

networks:
  intranet:
    driver: bridge
